<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1E3A5F">
  <title>Regards d'eau</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
  <style>
    /* ── Page de connexion ── */
    #login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #1E3A5F 0%, #2563EB 60%, #4BA3C3 100%);
      padding: 20px;
      font-family: 'Inter', system-ui, sans-serif;
    }
    .login-box {
      background: #fff;
      border-radius: 16px;
      padding: 36px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
    }
    .login-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }
    .login-header svg {
      width: 48px;
      height: 48px;
      flex-shrink: 0;
    }
    .login-tagline {
      font-size: 11px;
      color: #6B7280;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      font-weight: 600;
      margin-bottom: 2px;
    }
    .login-company {
      font-size: 22px;
      font-weight: 800;
      color: #1E3A5F;
      letter-spacing: -.5px;
      line-height: 1.1;
    }
    .login-sep {
      height: 1px;
      background: #E5E7EB;
      margin: 0 0 24px;
    }
    .login-error {
      background: #FEF2F2;
      color: #DC2626;
      border-left: 3px solid #DC2626;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .login-label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #6B7280;
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 5px;
    }
    .login-label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
    }
    .login-field-wrap {
      position: relative;
      margin-bottom: 16px;
    }
    .login-field-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      width: 15px;
      height: 15px;
      stroke: #9CA3AF;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }
    .login-input {
      width: 100%;
      padding: 9px 40px 9px 36px;
      border: 1.5px solid #E5E7EB;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Inter', system-ui, sans-serif;
      background: #fff;
      color: #111827;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      box-sizing: border-box;
    }
    .login-input:focus {
      border-color: #4BA3C3;
      box-shadow: 0 0 0 3px rgba(75,163,195,.12);
    }
    .login-input::placeholder { color: #9CA3AF; }
    .login-eye {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
    }
    .login-eye svg {
      width: 16px;
      height: 16px;
      stroke: #9CA3AF;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .login-eye:hover svg { stroke: #4BA3C3; }
    .login-forgot-btn {
      background: none;
      border: none;
      color: #4BA3C3;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', system-ui, sans-serif;
      padding: 0;
    }
    .login-forgot-btn:hover { text-decoration: underline; }
    .login-submit {
      width: 100%;
      padding: 11px;
      background: #4BA3C3;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Inter', system-ui, sans-serif;
      cursor: pointer;
      transition: background .15s;
      margin-top: 4px;
      letter-spacing: .1px;
    }
    .login-submit:hover { background: #3a8fab; }
    .login-forgot-panel {
      display: none;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #E5E7EB;
    }
    .login-forgot-title { font-size: 15px; font-weight: 700; margin-bottom: 6px; color: #111827; }
    .login-forgot-desc { font-size: 13px; color: #6B7280; margin-bottom: 14px; line-height: 1.5; }
    .login-footer {
      text-align: center;
      font-size: 11px;
      color: #9CA3AF;
      margin-top: 24px;
    }
    @media (max-width: 480px) {
      .login-box { padding: 28px 22px; }
      .login-company { font-size: 18px; }
    }
  </style>
</head>
<body>

<!-- ══ CONNEXION ══ -->
<div id="login-screen">
  <div class="login-box">

    <!-- En-tête : logo + société -->
    <div class="login-header">
      <svg viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
        <circle cx="22" cy="22" r="20" fill="none" stroke="#9CA3AF" stroke-width="3.5"/>
        <clipPath id="lclip"><rect x="2" y="22" width="40" height="20"/></clipPath>
        <circle cx="22" cy="22" r="18" fill="#4BA3C3" clip-path="url(#lclip)"/>
      </svg>
      <div>
        <div class="login-tagline">Piscines &amp; Wellness</div>
        <div class="login-company">Regards d'eau</div>
      </div>
    </div>

    <div class="login-sep"></div>

    <!-- Erreur -->
    <div class="login-error" id="login-error"></div>

    <!-- Formulaire -->
    <form id="login-form" onsubmit="doLogin(event)">

      <div>
        <label class="login-label">Adresse e-mail</label>
        <div class="login-field-wrap">
          <svg class="login-field-icon" viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input class="login-input" id="login-email" type="email" required placeholder="votre@email.com" autocomplete="email">
        </div>
      </div>

      <div>
        <div class="login-label-row">
          <label class="login-label" style="margin-bottom:0">Mot de passe</label>
          <button type="button" class="login-forgot-btn" onclick="toggleForgot()">Mot de passe oublié ?</button>
        </div>
        <div class="login-field-wrap">
          <svg class="login-field-icon" viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0110 0v4"/>
          </svg>
          <input class="login-input" id="login-password" type="password" required placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="login-eye" onclick="togglePwd()" tabindex="-1">
            <svg id="eye-icon" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="login-submit">Se connecter</button>
    </form>

    <!-- Panneau mot de passe oublié -->
    <div class="login-forgot-panel" id="forgot-panel">
      <div class="login-forgot-title">Mot de passe oublié</div>
      <p class="login-forgot-desc">Saisissez votre e-mail — un message sera envoyé à votre administrateur pour réinitialiser votre accès.</p>
      <div>
        <label class="login-label">Votre adresse e-mail</label>
        <div class="login-field-wrap">
          <input class="login-input" id="forgot-email" type="email" placeholder="votre@email.com" style="padding-left:12px">
        </div>
      </div>
      <button class="login-submit" onclick="sendForgot()" style="background:#374151">Envoyer la demande</button>
      <button type="button" class="login-forgot-btn" style="display:block;text-align:center;margin-top:12px;width:100%" onclick="toggleForgot()">← Retour à la connexion</button>
    </div>

    <div class="login-footer">Regards d'eau &copy; 2026 &mdash; Accès sécurisé</div>
  </div>
</div>

<!-- ══ APPLICATION ══ -->
<div id="app" style="display:none">
  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <aside id="sidebar">
    <div id="sidebar-logo">
      <svg width="36" height="36" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg" style="border-radius:9px;background:rgba(255,255,255,.1);padding:3px;flex-shrink:0">
        <circle cx="22" cy="22" r="20" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="3.5"/>
        <clipPath id="sclip"><rect x="2" y="22" width="40" height="20"/></clipPath>
        <circle cx="22" cy="22" r="18" fill="#4BA3C3" clip-path="url(#sclip)"/>
      </svg>
      <div>
        <div class="logo-text">Regards d'eau</div>
        <div class="logo-sub">v2.0</div>
      </div>
    </div>
    <div id="sidebar-user"></div>
    <nav id="sidebar-nav"></nav>
    <div id="sidebar-bottom"></div>
  </aside>

  <div id="main">
    <header id="topbar">
      <button class="topbar-btn" id="menu-toggle">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div id="topbar-title">Tableau de bord</div>
      <div id="topbar-search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input placeholder="Recherche..." id="global-search">
      </div>
      <button class="topbar-btn" id="btn-dark-mode" title="Mode sombre">
        <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
    </header>
    <main id="content">
      <div class="page" id="page-dashboard"></div>
      <div class="page" id="page-planning"></div>
      <div class="page" id="page-fiches"></div>
      <div class="page" id="page-clients"></div>
      <div class="page" id="page-chantiers"></div>
      <div class="page" id="page-stock"></div>
      <div class="page" id="page-stats"></div>
      <div class="page" id="page-equipe"></div>
      <div class="page" id="page-settings"></div>
    </main>
  </div>
</div>

<div id="bottom-nav"></div>
<div id="toast-container"></div>

<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/modules1.js"></script>
<script src="js/modules2.js"></script>
<script src="js/modules3.js"></script>
<script src="js/app.js"></script>
<script>
// ── Connexion ──────────────────────────────────────────────
function doLogin(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  const err   = document.getElementById('login-error');
  err.style.display = 'none';
  if (AUTH.login(email, pass)) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    APP.startApp();
  } else {
    err.style.display = 'block';
    err.textContent = 'Email ou mot de passe incorrect.';
    document.getElementById('login-password').value = '';
  }
}

// ── Afficher/masquer mot de passe ─────────────────────────
function togglePwd() {
  const input = document.getElementById('login-password');
  const svg   = document.getElementById('eye-icon');
  if (input.type === 'password') {
    input.type = 'text';
    svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    input.type = 'password';
    svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}

// ── Mot de passe oublié ───────────────────────────────────
function toggleForgot() {
  const panel = document.getElementById('forgot-panel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  if (panel.style.display === 'block') document.getElementById('forgot-email').focus();
}
function sendForgot() {
  const email = document.getElementById('forgot-email').value.trim();
  if (!email) { alert('Veuillez saisir votre adresse e-mail.'); return; }
  const settings = JSON.parse(localStorage.getItem('regards_settings') || '{}');
  const adminEmail = settings.admin_email || 'admin@regards-eau.be';
  const subject = encodeURIComponent("Demande réinitialisation mot de passe — Regards d'eau");
  const body = encodeURIComponent("Bonjour,\n\nL'utilisateur " + email + " demande une réinitialisation de son mot de passe.\n\nMerci de traiter cette demande.\n\nCordialement");
  window.location.href = 'mailto:' + adminEmail + '?subject=' + subject + '&body=' + body;
  setTimeout(toggleForgot, 500);
}

// ── Sidebar mobile ────────────────────────────────────────
document.getElementById('sidebar-overlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
});

// ── PWA ───────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
