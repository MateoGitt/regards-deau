<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1E3A5F">
  <title>Regards d'eau</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- ══ CONNEXION ══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <svg class="login-logo-img" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
        <circle cx="22" cy="22" r="20" fill="none" stroke="#9CA3AF" stroke-width="3.5"/>
        <clipPath id="half"><rect x="2" y="22" width="40" height="20"/></clipPath>
        <circle cx="22" cy="22" r="18" fill="#4BA3C3" clip-path="url(#half)"/>
      </svg>
      <div class="login-logo-text">
        <h1>Regards d'eau</h1>
        <p>Gestion piscines &amp; spas</p>
      </div>
    </div>
    <div class="login-error" id="login-error"></div>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-control" id="login-email" type="email" required placeholder="votre@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input class="form-control" id="login-password" type="password" required placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary w-full" style="justify-content:center;padding:10px;font-size:14px;margin-top:6px">Se connecter</button>
    </form>
    <div class="login-demo">
      <strong>Comptes de démonstration</strong>
      <div>patron@regards-eau.be &nbsp;/&nbsp; patron123</div>
      <div>tech1@regards-eau.be &nbsp;/&nbsp; tech123</div>
      <div>commercial@regards-eau.be &nbsp;/&nbsp; comm123</div>
    </div>
  </div>
</div>

<!-- ══ APPLICATION ══ -->
<div id="app" style="display:none">

  <!-- Sidebar overlay mobile -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div id="sidebar-logo">
      <svg width="36" height="36" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg" style="border-radius:9px;background:rgba(255,255,255,.1);padding:3px;flex-shrink:0">
        <circle cx="22" cy="22" r="20" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="3.5"/>
        <clipPath id="half2"><rect x="2" y="22" width="40" height="20"/></clipPath>
        <circle cx="22" cy="22" r="18" fill="#4BA3C3" clip-path="url(#half2)"/>
      </svg>
      <div>
        <div class="logo-text">Regards d'eau</div>
        <div class="logo-sub">v2.0</div>
      </div>
    </div>
    <div id="sidebar-user"></div>
    <nav id="sidebar-nav"></nav>
    <div id="sidebar-bottom"></div>
  </aside>

  <!-- Main -->
  <div id="main">
    <header id="topbar">
      <button class="topbar-btn" id="menu-toggle">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div id="topbar-title">Tableau de bord</div>
      <div id="topbar-search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input placeholder="Recherche..." id="global-search">
      </div>
      <button class="topbar-btn" id="btn-dark-mode" title="Mode sombre">
        <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
    </header>

    <main id="content">
      <div class="page" id="page-dashboard"></div>
      <div class="page" id="page-planning"></div>
      <div class="page" id="page-fiches"></div>
      <div class="page" id="page-clients"></div>
      <div class="page" id="page-chantiers"></div>
      <div class="page" id="page-stock"></div>
      <div class="page" id="page-stats"></div>
      <div class="page" id="page-equipe"></div>
      <div class="page" id="page-settings"></div>
    </main>
  </div>
</div>

<!-- Bottom nav mobile -->
<div id="bottom-nav"></div>

<!-- Toast -->
<div id="toast-container"></div>

<!-- Scripts -->
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/modules1.js"></script>
<script src="js/modules2.js"></script>
<script src="js/modules3.js"></script>
<script src="js/app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
// Sidebar overlay mobile
document.getElementById('sidebar-overlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
});
</script>
</body>
</html>
