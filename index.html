<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1a1a2e">
  <title>AquaPro — Gestion Piscines</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- ══════════════ ÉCRAN DE CONNEXION ══════════════ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <h1>💧 AquaPro</h1>
      <p>Gestion piscines & spas</p>
    </div>
    <div class="login-error" id="login-error"></div>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-control" id="login-email" type="email" required placeholder="votre@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input class="form-control" id="login-password" type="password" required placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;font-size:15px;margin-top:8px">Se connecter</button>
    </form>
    <div style="margin-top:20px;padding:14px;background:#f1f5f9;border-radius:10px;font-size:12px;color:#64748b">
      <div style="font-weight:700;margin-bottom:6px">Comptes de démonstration :</div>
      <div>👔 patron@aquapro.be / patron123</div>
      <div>💼 commercial@aquapro.be / comm123</div>
      <div>👷 tech1@aquapro.be / tech123</div>
      <div>⚙️ admin@aquapro.be / admin123</div>
    </div>
  </div>
</div>

<!-- ══════════════ APPLICATION PRINCIPALE ══════════════ -->
<div id="app" style="display:none">

  <!-- Sidebar -->
  <aside id="sidebar">
    <div id="sidebar-logo">
      <div class="logo-title">💧 AquaPro</div>
      <div class="logo-sub">Gestion piscines & spas</div>
    </div>
    <div id="sidebar-user"></div>
    <nav id="sidebar-nav"></nav>
    <div id="sidebar-bottom"></div>
  </aside>

  <!-- Main -->
  <div id="main">

    <!-- Topbar -->
    <header id="topbar">
      <button class="topbar-btn" id="menu-toggle" style="display:none">☰</button>
      <div id="topbar-title">Tableau de bord</div>
      <div id="topbar-search">
        <span>🔍</span>
        <input placeholder="Recherche globale..." id="global-search" oninput="APP.globalSearch && APP.globalSearch(this.value)">
      </div>
      <button class="topbar-btn" id="btn-dark-mode" title="Mode sombre">🌙</button>
    </header>

    <!-- Contenu -->
    <main id="content">
      <div class="page" id="page-dashboard"></div>
      <div class="page" id="page-planning"></div>
      <div class="page" id="page-fiches"></div>
      <div class="page" id="page-clients"></div>
      <div class="page" id="page-chantiers"></div>
      <div class="page" id="page-stock"></div>
      <div class="page" id="page-stats"></div>
      <div class="page" id="page-equipe"></div>
      <div class="page" id="page-settings"></div>
    </main>

  </div><!-- /main -->

</div><!-- /app -->

<!-- Bottom nav mobile -->
<div id="bottom-nav"></div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Scripts -->
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/modules1.js"></script>
<script src="js/modules2.js"></script>
<script src="js/modules3.js"></script>
<script src="js/app.js"></script>

<script>
// Responsive: afficher le bouton menu sur mobile
if (window.innerWidth <= 768) {
  document.getElementById('menu-toggle').style.display = 'flex';
}
window.addEventListener('resize', () => {
  document.getElementById('menu-toggle').style.display = window.innerWidth <= 768 ? 'flex' : 'none';
});

// Fermer sidebar au clic extérieur
document.addEventListener('click', e => {
  const sidebar = document.getElementById('sidebar');
  if (window.innerWidth <= 768 && sidebar.classList.contains('open') && !sidebar.contains(e.target) && e.target.id !== 'menu-toggle') {
    sidebar.classList.remove('open');
  }
});

// Service Worker pour PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(() => console.log('[AquaPro] Service Worker enregistré'));
}
</script>
</body>
</html>
