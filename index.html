<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1E3A5F">
  <title>Regards d'eau</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

<div id="login-screen">
  <div class="login-box">

    <!-- Logo + Nom société -->
    <div class="login-header">
      <svg class="login-logo-svg" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg">
        <circle cx="22" cy="22" r="20" fill="none" stroke="#9CA3AF" stroke-width="3.5"/>
        <clipPath id="lhalf"><rect x="2" y="22" width="40" height="20"/></clipPath>
        <circle cx="22" cy="22" r="18" fill="#4BA3C3" clip-path="url(#lhalf)"/>
      </svg>
      <div class="login-brand">
        <div class="login-tagline">Piscines &amp; Wellness</div>
        <div class="login-company">Regards d'eau</div>
      </div>
    </div>

    <div class="login-divider"></div>

    <div class="login-error" id="login-error"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label">Adresse e-mail</label>
        <div class="input-icon-wrap">
          <svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input class="form-control" id="login-email" type="email" required placeholder="votre@email.com" autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
          <label class="form-label" style="margin-bottom:0">Mot de passe</label>
          <button type="button" class="login-forgot" onclick="showForgot()">Mot de passe oublié ?</button>
        </div>
        <div class="input-icon-wrap">
          <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          <input class="form-control" id="login-password" type="password" required placeholder="••••••••" autocomplete="current-password">
          <button type="button" class="toggle-pwd" onclick="togglePwd()" tabindex="-1">
            <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-login">Se connecter</button>
    </form>

    <!-- Mot de passe oublié -->
    <div id="forgot-panel" style="display:none">
      <div class="login-divider"></div>
      <div class="forgot-title">Mot de passe oublié</div>
      <p class="forgot-desc">Saisissez votre e-mail — votre administrateur recevra une notification pour réinitialiser votre accès.</p>
      <div class="form-group">
        <label class="form-label">Votre adresse e-mail</label>
        <input class="form-control" id="forgot-email" type="email" placeholder="votre@email.com">
      </div>
      <button class="btn-login" onclick="sendForgot()" style="background:var(--gray-700)">Envoyer la demande</button>
      <button type="button" class="login-forgot" style="display:block;text-align:center;margin-top:12px;width:100%" onclick="hideForgot()">Retour à la connexion</button>
    </div>

    <div class="login-footer">Regards d'eau &copy; 2026 &mdash; Accès sécurisé</div>
  </div>
</div>

<!-- ══ APPLICATION ══ -->
<div id="app" style="display:none">

  <!-- Sidebar overlay mobile -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div id="sidebar-logo">
      <svg width="36" height="36" viewBox="0 0 44 44" xmlns="http://www.w3.org/2000/svg" style="border-radius:9px;background:rgba(255,255,255,.1);padding:3px;flex-shrink:0">
        <circle cx="22" cy="22" r="20" fill="none" stroke="rgba(255,255,255,.3)" stroke-width="3.5"/>
        <clipPath id="half2"><rect x="2" y="22" width="40" height="20"/></clipPath>
        <circle cx="22" cy="22" r="18" fill="#4BA3C3" clip-path="url(#half2)"/>
      </svg>
      <div>
        <div class="logo-text">Regards d'eau</div>
        <div class="logo-sub">v2.0</div>
      </div>
    </div>
    <div id="sidebar-user"></div>
    <nav id="sidebar-nav"></nav>
    <div id="sidebar-bottom"></div>
  </aside>

  <!-- Main -->
  <div id="main">
    <header id="topbar">
      <button class="topbar-btn" id="menu-toggle">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div id="topbar-title">Tableau de bord</div>
      <div id="topbar-search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input placeholder="Recherche..." id="global-search">
      </div>
      <button class="topbar-btn" id="btn-dark-mode" title="Mode sombre">
        <svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
    </header>

    <main id="content">
      <div class="page" id="page-dashboard"></div>
      <div class="page" id="page-planning"></div>
      <div class="page" id="page-fiches"></div>
      <div class="page" id="page-clients"></div>
      <div class="page" id="page-chantiers"></div>
      <div class="page" id="page-stock"></div>
      <div class="page" id="page-stats"></div>
      <div class="page" id="page-equipe"></div>
      <div class="page" id="page-settings"></div>
    </main>
  </div>
</div>

<!-- Bottom nav mobile -->
<div id="bottom-nav"></div>

<!-- Toast -->
<div id="toast-container"></div>

<!-- Scripts -->
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/utils.js"></script>
<script src="js/modules1.js"></script>
<script src="js/modules2.js"></script>
<script src="js/modules3.js"></script>
<script src="js/app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
// Sidebar overlay mobile
document.getElementById('sidebar-overlay').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
});
</script>
<script>
function togglePwd() {
  const input = document.getElementById('login-password');
  const icon = document.getElementById('eye-icon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
  } else {
    input.type = 'password';
    icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  }
}
function showForgot() {
  document.getElementById('forgot-panel').style.display = 'block';
  document.getElementById('forgot-email').focus();
}
function hideForgot() {
  document.getElementById('forgot-panel').style.display = 'none';
}
function sendForgot() {
  const email = document.getElementById('forgot-email').value.trim();
  if (!email) return;
  const settings = JSON.parse(localStorage.getItem('regards_settings') || '{}');
  const adminEmail = settings.admin_email || 'admin@regards-eau.be';
  const subject = encodeURIComponent('Demande réinitialisation mot de passe — Regards d'eau');
  const body = encodeURIComponent('Bonjour,\n\nL'utilisateur ' + email + ' demande une réinitialisation de son mot de passe sur Regards d'eau.\n\nMerci de traiter cette demande.\n\nCordialement');
  window.location.href = 'mailto:' + adminEmail + '?subject=' + subject + '&body=' + body;
  setTimeout(hideForgot, 500);
}
</script>
</body>
</html>
